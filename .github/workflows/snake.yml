name: generate contribution snake

# Regenerates the animated contribution-grid snake on:
#   - every push to main (so README never serves a stale snake)
#   - every 12 hours via cron
#   - manual dispatch from the Actions tab
#
# Inputs used (github.repository_owner) are system-controlled; no
# user-supplied data is interpolated into any shell step.

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: generate svgs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2322D3EE&color_dots=%23161616,%231e3a44,%23227a86,%2322D3EE,%235EEAD4

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
